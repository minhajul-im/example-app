version: "3.8"

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: fullstack-db
    environment:
      MYSQL_DATABASE: fullstack_app
      MYSQL_USER: fullstack_user
      MYSQL_PASSWORD: fullstack_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - fullstack-network
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "fullstack_user",
          "-pfullstack_password",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fullstack-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_USERNAME: fullstack_user
      MYSQL_PASSWORD: fullstack_password
      MYSQL_DATABASE: fullstack_app
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fullstack-network

  # React Frontend with Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fullstack-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - fullstack-network

networks:
  fullstack-network:
    driver: bridge

volumes:
  mysql_data:
